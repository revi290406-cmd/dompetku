<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompetku - Catatan Keuangan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Fitur Baru: Layar Kunci PIN Rahasia -->
    <div id="pin-screen" class="pin-overlay">
        <div class="pin-box">
            <h3>🔒 Masukkan PIN Anda</h3>
            <p id="pin-info" style="font-size: 12px; color: gray; margin-bottom: 15px;">PIN bawaan pertama kali: 1234</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••" autocomplete="off">
            <button onclick="verifikasiPIN()">Buka Dompet</button>
        </div>
    </div>

    <div class="container">
        <div class="header-app">
            <h2>Dompetku</h2>
            <button id="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
        
        <div class="dashboard">
            <!-- Kartu ATM Premium -->
            <div class="card saldo" id="kartu-atm">
                <div class="card-top">
                    <span class="card-label">Digital Wallet</span>
                    <span class="card-chip">🪙</span>
                </div>
                <div class="card-middle">
                    <h4>Total Saldo</h4>
                    <h1 id="saldo">Rp 0</h1>
                    <!-- Fitur Baru: Teks Status Peringatan Anggaran -->
                    <span id="status-anggaran" class="status-badge">Aman</span>
                </div>
                <div class="card-bottom">
                    <span>**** **** **** 2026</span>
                    <span class="card-brand">PREMIUM</span>
                </div>
            </div>

            <!-- Fitur Baru: Set Batas Anggaran Bulanan -->
            <div class="budget-section">
                <label for="input-budget">🎯 Batas Anggaran Pengeluaran:</label>
                <div class="budget-input-group">
                    <input type="number" id="input-budget" placeholder="Set Batas (Misal: 1000000)" onchange="simpanBudget()">
                </div>
            </div>

            <div class="card-group">
                <div class="card masuk">
                    <h4>Pemasukan</h4>
                    <p id="pemasukan">Rp 0</p>
                </div>
                <div class="card keluar">
                    <h4>Pengeluaran</h4>
                    <p id="pengeluaran">Rp 0</p>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Tambah Transaksi</h3>
            <input type="date" id="tanggal">
            <select id="kategori">
                <option value="Makanan 🍔">Makanan 🍔</option>
                <option value="Transportasi 🚗">Transportasi 🚗</option>
                <option value="Belanja 🛍️">Belanja 🛍️</option>
                <option value="Tagihan 📄">Tagihan 📄</option>
                <option value="Gaji 💰">Gaji 💰</option>
                <option value="Lainnya 📌">Lainnya 📌</option>
            </select>
            
            <input type="text" id="keterangan" placeholder="Keterangan (Opsional)">
            <input type="number" id="nominal" placeholder="Nominal (Misal: 50000)">
            <select id="jenis">
                <option value="masuk">Pemasukan (+)</option>
                <option value="keluar">Pengeluaran (-)</option>
            </select>
            <button class="btn-simpan" onclick="tambahData()">Simpan Transaksi</button>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h3>Riwayat Transaksi</h3>
                <!-- Fitur Baru: Filter Kategori -->
                <select id="filter-kategori" onchange="updateTampilan()">
                    <option value="semua">Semua 📑</option>
                    <option value="Makanan 🍔">Makanan 🍔</option>
                    <option value="Transportasi 🚗">Transportasi 🚗</option>
                    <option value="Belanja 🛍️">Belanja 🛍️</option>
                    <option value="Tagihan 📄">Tagihan 📄</option>
                    <option value="Gaji 💰">Gaji 💰</option>
                    <option value="Lainnya 📌">Lainnya 📌</option>
                </select>
            </div>
            <ul id="list-riwayat"></ul>
            <button class="reset-btn" onclick="resetData()">🗑️ Hapus Semua Data</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
